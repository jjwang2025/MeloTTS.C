# Required model files.
bert_model_path = ../models/bert_base_uncased.onnx
bert_vocab_path = ../models/bert-base-uncased-vocab.txt
acoustic_model_path = ../models/melotts_en_infer.onnx

# Optional CMU dictionary. Leave empty to use built-in fallback pronunciation rules.
cmudict_path =

# Optional custom G2P lexicon. This is checked before CMUdict and fallback rules.
g2p_lexicon_path = ../lexicons/programming_terms.lexicon

# Runtime defaults.
sample_rate = 44100
speaker_id = 0
english_language_id = 2
english_tone_start = 7
add_blank = true
sdp_ratio = 0.2
noise_scale = 0.6
noise_scale_w = 0.8
speed = 1.0

# BERT ONNX names. The model is expected to output [1, token_count, 768].
bert_input_ids_name = input_ids
bert_attention_mask_name = attention_mask
bert_token_type_ids_name = token_type_ids
bert_output_name = last_hidden_state
bert_use_token_type_ids = true

# MeloTTS acoustic ONNX names. Adjust them if your exported graph uses different names.
acoustic_x_name = x
acoustic_x_lengths_name = x_lengths
acoustic_sid_name = sid
acoustic_tone_name = tone
acoustic_language_name = language
acoustic_bert_name = bert
acoustic_ja_bert_name = ja_bert
acoustic_noise_scale_name = noise_scale
acoustic_length_scale_name = length_scale
acoustic_noise_scale_w_name = noise_scale_w
acoustic_sdp_ratio_name = sdp_ratio
acoustic_output_name = audio
